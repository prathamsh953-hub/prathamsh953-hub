name: Generate 3D Contribution

on:
schedule:
- cron: "0 0 * * *"
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v3

  - name: Generate 3D graph
    uses: yoshi389111/github-profile-3d-contrib@main
    with:
      github_user_name: PrathameshRSH26

  - name: Commit files
    run: |
      git config user.name "github-actions"
      git config user.email "actions@github.com"
      git add -A
      git commit -m "update 3d graph" || echo "no changes"
      git push
```
